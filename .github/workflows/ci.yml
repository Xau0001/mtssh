name: CI

# Runs on every push to main and on all Pull Requests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-linux:
    name: Build — Linux (amd64)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Install Linux GUI dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            gcc \
            libgl1-mesa-dev \
            xorg-dev \
            libx11-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxinerama-dev \
            libxi-dev

      - name: Download Go modules
        run: go mod download

      - name: Verify modules
        run: go mod verify

      - name: Build
        run: go build -v -ldflags "-s -w" -o mtputty .

      - name: Check binary exists
        run: |
          ls -lh mtputty
          file mtputty

  build-windows:
    name: Build — Windows (cross-compile)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Install MinGW cross-compiler
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Download Go modules
        run: go mod download

      - name: Cross-compile for Windows
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: '1'
          CC: x86_64-w64-mingw32-gcc
        run: go build -v -ldflags "-s -w -H windowsgui" -o mtputty.exe .

      - name: Check binary exists
        run: ls -lh mtputty.exe
