<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Background -->
  <rect x="0" y="24" width="512" height="488" rx="94" fill="#1e1e2e"/>

  <!-- Tabs -->
  <rect x="145" y="10" width="110" height="46" rx="12" fill="#5b8a72" opacity="0.35"/>
  <rect x="77" y="0" width="110" height="46" rx="12" fill="#5b8a72" opacity="0.55"/>
  <rect x="8" y="0" width="124" height="56" rx="16" fill="#5b8a72"/>
  <text x="70" y="38" text-anchor="middle" font-family="monospace" font-size="22" fill="#1e1e2e" font-weight="700">SSH</text>

  <!-- Prompt cursor -->
  <rect x="60" y="108" width="8" height="60" rx="4" fill="#5b8a72"/>

  <!-- mt monogram -->
  <text x="256" y="330" text-anchor="middle" font-family="monospace" font-size="188" font-weight="700" fill="#c8d6e5">mt</text>

  <!-- Terminal lines -->
  <rect x="60" y="400" width="210" height="4" rx="2" fill="#5b8a72" opacity="0.2"/>
  <rect x="60" y="424" width="140" height="4" rx="2" fill="#5b8a72" opacity="0.13"/>

  <!-- Tab indicator bars -->
  <rect x="106" y="470" width="76" height="8" rx="4" fill="#5b8a72"/>
  <rect x="200" y="470" width="76" height="8" rx="4" fill="#5b8a72" opacity="0.5"/>
  <rect x="294" y="470" width="76" height="8" rx="4" fill="#5b8a72" opacity="0.25"/>

  <!-- Lock -->
  <g transform="translate(408, 430)">
    <rect x="0" y="16" width="38" height="30" rx="6" fill="#5b8a72" opacity="0.5"/>
    <path d="M7 16V11a12 12 0 0124 0v5" fill="none" stroke="#5b8a72" stroke-width="3.5" stroke-linecap="round" opacity="0.5"/>
  </g>
</svg>
